<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebWise Summarizer</title>
    <style>
        :root{
            --bg:#0f172a;
            --card:#0b1220;
            --muted:#94a3b8;
            --accent:#7c3aed;
            --glass: rgba(255,255,255,0.03);
        }
        html,body{height:100%;margin:0}
        body{
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, Arial;
            background: linear-gradient(180deg,#07102a 0%, #07182f 100%);
            color:#e6eef8;
            display:flex;align-items:center;justify-content:center;padding:32px;
        }
        .container{
            width:100%;max-width:980px;background:linear-gradient(180deg,var(--card),#071226);
            border-radius:14px;padding:28px;box-shadow:0 10px 30px rgba(2,6,23,0.6);backdrop-filter:blur(6px);
        }
        header{display:flex;gap:16px;align-items:center;margin-bottom:18px}
        .logo{width:54px;height:54px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#4f46e5);display:flex;align-items:center;justify-content:center;font-weight:700}
        h1{font-size:20px;margin:0}
        p.subtitle{margin:0;color:var(--muted);font-size:13px}

        .grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:18px}
        @media (max-width:820px){.grid{grid-template-columns:1fr}}

        .panel{background:var(--glass);padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
        textarea{width:100%;min-height:260px;padding:14px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;resize:vertical;font-size:14px}

        .settings{display:flex;flex-direction:column;gap:12px}
        .radio{display:flex;flex-direction:column;gap:10px}
        label.option{display:flex;gap:10px;align-items:flex-start;cursor:pointer}

        .btn{background:linear-gradient(90deg,var(--accent),#4f46e5);border:none;padding:12px 14px;color:white;border-radius:8px;font-weight:600;cursor:pointer}

        .results{margin-top:16px;background:#071a33;border-radius:10px;padding:14px;border:1px solid rgba(79,70,229,0.08)}
        .result-text{white-space:pre-wrap;line-height:1.6;color:#dbeafe}

        .meta{display:flex;gap:8px;align-items:center}
        .small{font-size:13px;color:var(--muted)}

        .actions{display:flex;gap:8px}
        .copy-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:8px 10px;border-radius:8px;cursor:pointer}

        .spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,0.06);border-top-color:white;border-radius:50%;animation:spin .9s linear infinite;display:inline-block;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">WS</div>
        <div>
            <h1>WebWise Text Summarizer</h1>
            <p class="subtitle">Fast extractive & optional abstractive summaries — paste text and press Generate.</p>
        </div>
    </header>

    <form method="POST" action="/">
        <div class="grid">
            <div class="panel">
                <label for="user_text" class="small" style="font-weight:600;display:block;margin-bottom:8px">Input text</label>
                <textarea id="user_text" name="user_text" placeholder="Paste long paragraphs here...">{{ original_text }}</textarea>
                <div class="small" style="margin-top:8px;color:var(--muted)">Tip: try ~3–6 paragraphs for best summaries.</div>
            </div>

            <aside class="panel settings">
                <div>
                    <div style="font-weight:700;margin-bottom:8px">Engine</div>
                    <div class="radio">
                        <label class="option"><input type="radio" name="method" value="transformers" {% if selected_method == 'transformers' %}checked{% endif %}><div><strong>Transformers</strong><div class="small">Abstractive (requires transformers & torch)</div></div></label>
                        <label class="option"><input type="radio" name="method" value="scikit" {% if selected_method == 'scikit' %}checked{% endif %}><div><strong>Scikit-Learn</strong><div class="small">Faster extractive summary using TF‑IDF</div></div></label>
                    </div>
                </div>

                <div style="margin-top:auto">
                    <button id="generateBtn" class="btn" type="submit">Generate Summary</button>
                </div>
            </aside>
        </div>
    </form>

    {% if summary %}
    <div class="results">
        <div class="meta" style="justify-content:space-between">
            <div><strong>Generated Summary</strong></div>
            <div class="actions">
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
        </div>
        {% if fallback_message %}
        <div class="small" style="margin-top:10px;color:#c7d2fe">{{ fallback_message }}</div>
        {% endif %}
        <div style="height:12px"></div>
        <div class="result-text">{{ summary }}</div>
    </div>
    {% endif %}
    
</div>

<script>
// Show a spinner on submit and disable the button
const form = document.querySelector('form');
const gen = document.getElementById('generateBtn');
if(form && gen){
    form.addEventListener('submit', ()=>{
        gen.disabled = true;
        gen.textContent = 'Generating...';
    });
}

// Copy summary
const copyBtn = document.getElementById('copyBtn');
if(copyBtn){
    copyBtn.addEventListener('click', async (e)=>{
        e.preventDefault();
        const text = document.querySelector('.result-text').innerText;
        try{ await navigator.clipboard.writeText(text); copyBtn.textContent = 'Copied'; setTimeout(()=>copyBtn.textContent='Copy',1500);}catch(e){alert('Copy failed');}
    });
}
</script>
</body>
</html>
